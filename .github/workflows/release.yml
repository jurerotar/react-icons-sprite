name: release

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup environment (node + install)
        uses: ./.github/actions/node-setup

      - name: Build package
        run: npm run build --workspace react-icons-sprite

      - name: Publish package with provenance
        run: npm publish --workspace react-icons-sprite --access public
